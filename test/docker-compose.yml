# Local test environment for the Caputchin plugin.
#
# Runs a real WordPress at http://localhost:8080 with the plugin active. By
# default the widget loads from the published bundle and verification uses the
# hosted Caputchin service, so you only need a site key. To point at a different
# widget build or verification endpoint, set CAPUTCHIN_WIDGET_SRC and
# CAPUTCHIN_VERIFY_URL in the environment (a docker-compose.override.yml can
# supply these). See README.md.

services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    image: wordpress:6-php8.3-apache
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DEBUG: "1"
      # Optional overrides read by the test mu-plugin. Empty = plugin defaults
      # (published widget bundle + hosted verification).
      CAPUTCHIN_WIDGET_SRC: "${CAPUTCHIN_WIDGET_SRC:-}"
      CAPUTCHIN_VERIFY_URL: "${CAPUTCHIN_VERIFY_URL:-}"
    volumes:
      - wp-data:/var/www/html
      # The plugin source (repo root). Read-only.
      - ../:/var/www/html/wp-content/plugins/caputchin:ro
      # Test-only config that reads the optional override env. Never shipped.
      - ./mu-plugins:/var/www/html/wp-content/mu-plugins:ro

  wpcli:
    image: wordpress:cli-php8.3
    depends_on:
      db:
        condition: service_healthy
    # Match the wordpress image file ownership (www-data).
    user: "33:33"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      CPT_PUB: "${CPT_PUB:-}"
      CPT_SEC: "${CPT_SEC:-}"
    volumes:
      - wp-data:/var/www/html
      - ../:/var/www/html/wp-content/plugins/caputchin:ro
      - ./mu-plugins:/var/www/html/wp-content/mu-plugins:ro
      - ./provision.sh:/provision.sh:ro
    entrypoint: ["bash", "/provision.sh"]

volumes:
  db-data:
  wp-data:
