name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The plugin's PHP floor. phpcs (PHPCompatibilityWP) + phpunit run here.
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none
          tools: composer

      - run: composer install --no-interaction --no-progress

      - name: Coding standards
        run: composer lint

      - name: Unit tests
        run: composer test
